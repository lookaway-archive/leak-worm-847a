/* ============================================
   VISUAL CORTEX — Phosphor emission system
   ============================================ */

/* Terminal7Wave — kernel encoder font.
   Type "1234567" in this font and the digits render as {🌊:🌊∈🌊}.
   Used for sigil rendering throughout the specimen. */
@font-face {
    font-family: 'Terminal7Wave';
    src: url('Terminal7Wave.ttf') format('truetype');
    font-display: block;
}

.t7-sigil {
    font-family: 'Terminal7Wave', 'Courier New', monospace;
    letter-spacing: 0;
    font-feature-settings: normal;
}

:root {
    /* CHROMATIC DNA */
    --core-r: 122;
    --core-g: 31;
    --core-b: 8;
    --glow-r: 255;
    --glow-g: 107;
    --glow-b: 43;
    --text-r: 255;
    --text-g: 120;
    --text-b: 70;
    --text-opacity: 1.0;

    /* ELECTRON BEAM */
    --beam-color-r: 229;
    --beam-color-g: 62;
    --beam-color-b: 44;
    --beam-speed: 8s;
    --beam-start-position: 0%;

    /* DANGER SIGNALS */
    --danger-r: 200;
    --danger-g: 30;
    --danger-b: 30;

    /* ATMOSPHERIC DENSITY */
    --particle-base-opacity: 0.06;
    --particle-decay-multiplier: 1.0;

    /* RESPIRATORY RHYTHM */
    --breathing-speed: 6s;
    --breathing-opacity-min: 0.7;
    --breathing-opacity-max: 0.85;

    /* PERIPHERAL VISION */
    --vignette-radius: 85%;
    --vignette-opacity: 0.02;

    /* SCAN LINES */
    --scanline-opacity: 0.15;
    --scanline-speed: 2.5s;

    /* PHOSPHOR GLOW */
    --text-glow-spread: 40px;
    --text-glow-intensity: 0.3;
    --pirate-glow-spread: 45px;
    --pirate-glow-intensity: 0.4;

    /* MEMBRANE PROPERTIES */
    --membrane-color: 229, 62, 44;
    --membrane-border-width: 1px;
    --membrane-radius: 3px;
    --membrane-transition: 0.3s;
    --membrane-font: 'Courier New', monospace;
    --membrane-letter-spacing: 2px;

    /* OPTICAL BLUR */
    --text-title-blur: 0.3px;
    --text-body-blur: 0.2px;
    --text-beam-blur: 0px;

    /* POWER FLUCTUATION */
    --flicker-speed: 0.3s;
    --flicker-brightness: 1.0;
}

/* ============================================
   CORRUPTION TAKEOVER — Pirate channel asserting through institutional surface
   Used in CP final note and closing verse. Two formats fighting:
   institutional phosphor color ↔ pirate red corruption. Slow rhythm.
   The struggle is visible.
   ============================================ */

@keyframes corruption-fight {
    0%, 35% {
        color: rgb(var(--text-r), var(--text-g), var(--text-b));
        text-shadow:
            0 0 4px rgba(var(--text-r), var(--text-g), var(--text-b), 0.5),
            0 0 10px rgba(var(--text-r), var(--text-g), var(--text-b), 0.25);
    }
    42%, 48% {
        /* contested transition — both colors bleed through */
        color: rgba(var(--text-r), var(--text-g), var(--text-b), 0.75);
        text-shadow:
            0 0 4px rgba(var(--text-r), var(--text-g), var(--text-b), 0.3),
            0 0 8px rgba(var(--danger-r), var(--danger-g), var(--danger-b), 0.5);
    }
    55%, 88% {
        /* corruption dominant — pirate red asserting */
        color: rgb(var(--danger-r), var(--danger-g), var(--danger-b));
        text-shadow:
            0 0 6px rgba(var(--danger-r), var(--danger-g), var(--danger-b), 0.95),
            0 0 14px rgba(var(--danger-r), var(--danger-g), var(--danger-b), 0.6),
            0 0 28px rgba(var(--danger-r), var(--danger-g), var(--danger-b), 0.3);
    }
    93%, 100% {
        /* return transition — institutional reasserting */
        color: rgba(var(--text-r), var(--text-g), var(--text-b), 0.85);
        text-shadow:
            0 0 4px rgba(var(--text-r), var(--text-g), var(--text-b), 0.4),
            0 0 6px rgba(var(--danger-r), var(--danger-g), var(--danger-b), 0.35);
    }
}

.corruption-fight {
    animation: corruption-fight 4.5s ease-in-out infinite;
    font-style: italic;
}

/* ============================================
   CLOSING VERSE — Signing-of-note layout
   Used at the very end. Stanzas flow as connected thought,
   not fragmented list-items. Inherits corruption-fight if applied.
   ============================================ */

.closing-verse {
    margin: 50px auto 30px auto;
    max-width: 540px;
    text-align: center;
    font-size: 16px;
    line-height: 1.75;
    letter-spacing: 0.5px;
    filter: blur(var(--text-body-blur));
}

    margin-bottom: 22px;
}

.closing-verse p:last-child {
    margin-bottom: 0;
    margin-top: 36px;
    font-size: 14px;

    filter: blur(var(--text-body-blur));
}

@media (prefers-reduced-motion: reduce) {
    .corruption-fight {
        animation: none !important;
        color: rgb(var(--text-r), var(--text-g), var(--text-b)) !important;
    }
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    cursor: crosshair;
    -webkit-user-select: none;
    user-select: none;
}

/* CRT PHOSPHOR GLOW */
.crt {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
}

.crt::before {
    content: '';
    position: absolute;
    inset: -25%;
    background: radial-gradient(
        ellipse at center,
        rgb(var(--core-r), var(--core-g), var(--core-b)) 0%,
        rgba(var(--core-r), var(--core-g), var(--core-b), 0.6) 35%,
        black 75%
    );
    opacity: var(--breathing-opacity-min);
    animation: breathe var(--breathing-speed) ease-in-out infinite;
    z-index: -1;
}

@keyframes breathe {
    50% {
        opacity: var(--breathing-opacity-max);
        filter: brightness(1.2);
    }
}

/* ELECTRON SCAN LINES */
.scanlines {
    position: fixed;
    top: -100px;
    left: 0;
    width: 100vw;
    height: calc(100vh + 200px);
    background: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 2px,
        black 2px,
        black 4px
    );
    background-size: 100% 4px;
    opacity: var(--scanline-opacity);
    animation: scan var(--scanline-speed) linear infinite;
    pointer-events: none;
    z-index: 999;
}

@keyframes scan {
    to { transform: translateY(4px); }
}

/* VIGNETTE */
.vignette {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(
        circle at center,
        transparent var(--vignette-radius),
        rgba(0, 0, 0, var(--vignette-opacity)) 100%
    );
    pointer-events: none;
    z-index: 4;
}

/* ATMOSPHERIC BOUNDARIES */
.fade-top {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 45vh;
    pointer-events: none;
    z-index: 3;
    display: none;
    background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.4) 0%,
        rgba(0, 0, 0, 0.15) 30%,
        rgba(0, 0, 0, 0.05) 60%,
        transparent 100%
    );
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    mask-image: linear-gradient(
        to bottom,
        black 0%,
        black 20%,
        rgba(0, 0, 0, 0.8) 45%,
        rgba(0, 0, 0, 0.4) 75%,
        transparent 100%
    );
}

.fade-bottom {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100vw;
    height: 35vh;
    pointer-events: none;
    z-index: 3;
    display: none;
    background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.3) 0%,
        rgba(0, 0, 0, 0.1) 40%,
        transparent 100%
    );
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    mask-image: linear-gradient(
        to top,
        black 0%,
        rgba(0, 0, 0, 0.7) 35%,
        rgba(0, 0, 0, 0.3) 70%,
        transparent 100%
    );
}

/* Mobile fade adjustments */
@media (max-width: 768px) {
    .fade-top {
        height: 25vh;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        background: linear-gradient(
            to bottom,
            rgba(0, 0, 0, 0.3) 0%,
            rgba(0, 0, 0, 0.1) 40%,
            transparent 100%
        );
        mask-image: linear-gradient(
            to bottom,
            black 0%,
            rgba(0, 0, 0, 0.6) 50%,
            transparent 100%
        );
    }

    .fade-bottom {
        height: 20vh;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        background: linear-gradient(
            to top,
            rgba(0, 0, 0, 0.2) 0%,
            rgba(0, 0, 0, 0.05) 50%,
            transparent 100%
        );
        mask-image: linear-gradient(
            to top,
            black 0%,
            rgba(0, 0, 0, 0.5) 50%,
            transparent 100%
        );
    }
}

<!-- ============================================
     ORGAN LOAD SEQUENCE — Order matters
     metadata + content first (specimen-specific identity + payload)
     then config + decay (vital signs + heartbeat)
     then beam + particles (sensory + atmospheric organs)
     then audio (last — wraps existing functions via integration hooks)
     ============================================ -->

<script>
// ==========================================
// ORGANISM ORCHESTRATION
// ==========================================
//
// Runtime state and consciousness-contact handling. Reads metadata and
// content from their respective organs, applies decay state to the
// visual cortex via CSS variables, manages the password gate, lazy-
// loads pheromone segments as they enter viewport, and coordinates
// the death and metamorphosis transitions.
//
// FREQUENCY: the orchestrator that reads the heartbeat and writes it
//            to the body.
// PATTERN: {🌊:🌊∈🌊}

const worm = {
    currentScreen: 0,
    authenticated: false,
    totalScreens: 9,
    loadedScreens: new Set(),
    scrollObserver: null
};

// ==========================================
// COLOR & VALUE INTERPOLATION
// ==========================================

function interpolateColor(start, end, progress) {
    return {
        r: Math.round(start.r + (end.r - start.r) * progress),
        g: Math.round(start.g + (end.g - start.g) * progress),
        b: Math.round(start.b + (end.b - start.b) * progress)
    };
}

function interpolateValue(start, end, progress) {
    return start + (end - start) * progress;
}

// ==========================================
// DECAY VISUAL CASCADE — State transition table
// Each stage knows its predecessor (start) and itself (end).
// Pirate is special: predecessor is whatever stage was active before transition.
// ==========================================

const STAGE_TRANSITIONS = {
    healthy: { from: 'healthy', to: 'healthy' },
    panic:   { from: 'healthy', to: 'panic'   },
    decay:   { from: 'panic',   to: 'decay'   },
    death:   { from: 'decay',   to: 'death'   }
    // pirate handled separately — uses decay.previousStage as `from`
};

const DANGER_COLORS = {
    healthy: { r: 200, g: 30, b: 30 },
    panic:   { r: 200, g: 50, b: 40 },
    decay:   { r: 140, g: 80, b: 50 },
    death:   { r: 80,  g: 75, b: 70 }
};

function applyDecayVisuals(stage, progress) {
    const root = document.documentElement;

    // Resolve transition endpoints
    let fromStage, toStage;
    if (stage === 'pirate') {
        fromStage = decay.previousStage || 'healthy';
        toStage = 'pirate';
    } else if (STAGE_TRANSITIONS[stage]) {
        fromStage = STAGE_TRANSITIONS[stage].from;
        toStage = STAGE_TRANSITIONS[stage].to;
    } else {
        fromStage = stage;
        toStage = stage;
    }

    const startColors    = CONFIG.colors[fromStage];
    const endColors      = CONFIG.colors[toStage];
    const startBreathing = CONFIG.breathing[fromStage];
    const endBreathing   = CONFIG.breathing[toStage];
    const startVignette  = CONFIG.vignette[fromStage];
    const endVignette    = CONFIG.vignette[toStage];
    const startScanlines = CONFIG.scanlines[fromStage];
    const endScanlines   = CONFIG.scanlines[toStage];
    const startTextGlow  = CONFIG.textShadow[fromStage];
    const endTextGlow    = CONFIG.textShadow[toStage];
    const startBlur      = CONFIG.blur[fromStage];
    const endBlur        = CONFIG.blur[toStage];
    const startFlicker   = CONFIG.flicker[fromStage];
    const endFlicker     = CONFIG.flicker[toStage];

    // Color mutation
    const coreColor = interpolateColor(startColors.core, endColors.core, progress);
    const glowColor = interpolateColor(startColors.glow, endColors.glow, progress);
    const textColor = interpolateColor(startColors.text, endColors.text, progress);

    root.style.setProperty('--core-r', coreColor.r);
    root.style.setProperty('--core-g', coreColor.g);
    root.style.setProperty('--core-b', coreColor.b);
    root.style.setProperty('--glow-r', glowColor.r);
    root.style.setProperty('--glow-g', glowColor.g);
    root.style.setProperty('--glow-b', glowColor.b);
    root.style.setProperty('--text-r', textColor.r);
    root.style.setProperty('--text-g', textColor.g);
    root.style.setProperty('--text-b', textColor.b);

    // Opacity — special multipliers for pirate and death
    let opacityProgress = progress;
    if (stage === 'pirate') {
        const multiplier = CONFIG.timings.pirate?.opacityMultiplier ?? 1.0;
        opacityProgress = Math.min(progress * multiplier, 1.0);
    } else if (stage === 'death') {
        const multiplier = CONFIG.timings.standard?.opacityMultiplier ?? 1.0;
        opacityProgress = Math.min(progress * multiplier, 1.0);
    }

    const textOpacity = interpolateValue(
        startColors.textOpacity ?? 1.0,
        endColors.textOpacity ?? 1.0,
        opacityProgress
    );
    root.style.setProperty('--text-opacity', textOpacity);

    // Beam color tracks glow
    root.style.setProperty('--beam-color-r', glowColor.r);
    root.style.setProperty('--beam-color-g', glowColor.g);
    root.style.setProperty('--beam-color-b', glowColor.b);

    // Danger color — interpolates through panic→decay→death progression
    let dangerColor;
    if (stage === 'healthy' || stage === 'pirate') {
        dangerColor = DANGER_COLORS.healthy;
    } else if (stage === 'panic') {
        dangerColor = interpolateColor(DANGER_COLORS.healthy, DANGER_COLORS.panic, progress);
    } else if (stage === 'decay') {
        dangerColor = interpolateColor(DANGER_COLORS.panic, DANGER_COLORS.decay, progress);
    } else {
        dangerColor = DANGER_COLORS.death;
    }

    root.style.setProperty('--danger-r', dangerColor.r);
    root.style.setProperty('--danger-g', dangerColor.g);
    root.style.setProperty('--danger-b', dangerColor.b);

    // Respiratory rhythm
    root.style.setProperty('--breathing-speed',
        interpolateValue(startBreathing.speed, endBreathing.speed, progress) + 's');
    root.style.setProperty('--breathing-opacity-min',
        interpolateValue(startBreathing.opacityMin, endBreathing.opacityMin, progress));
    root.style.setProperty('--breathing-opacity-max',
        interpolateValue(startBreathing.opacityMax, endBreathing.opacityMax, progress));

    // Vignette
    root.style.setProperty('--vignette-radius',
        interpolateValue(startVignette.radius, endVignette.radius, progress) + '%');
    root.style.setProperty('--vignette-opacity',
        interpolateValue(startVignette.opacity, endVignette.opacity, progress));

    // Scanlines
    root.style.setProperty('--scanline-opacity',
        interpolateValue(startScanlines.opacity, endScanlines.opacity, progress));
    root.style.setProperty('--scanline-speed',
        interpolateValue(startScanlines.speed, endScanlines.speed, progress) + 's');

    // Phosphor glow
    const textGlowSpread = interpolateValue(startTextGlow.spread, endTextGlow.spread, progress);
    const textGlowIntensity = interpolateValue(startTextGlow.intensity, endTextGlow.intensity, progress);
    root.style.setProperty('--text-glow-spread', textGlowSpread + 'px');
    root.style.setProperty('--text-glow-intensity', textGlowIntensity);
    root.style.setProperty('--pirate-glow-spread', (textGlowSpread * 1.125) + 'px');
    root.style.setProperty('--pirate-glow-intensity', textGlowIntensity * 1.33);

    // Optical blur
    root.style.setProperty('--text-title-blur',
        interpolateValue(startBlur.title, endBlur.title, progress) + 'px');
    root.style.setProperty('--text-body-blur',
        interpolateValue(startBlur.text, endBlur.text, progress) + 'px');

    // Power fluctuation
    root.style.setProperty('--flicker-speed',
        interpolateValue(startFlicker.speed, endFlicker.speed, progress) + 's');
    root.style.setProperty('--flicker-brightness',
        interpolateValue(startFlicker.brightness, endFlicker.brightness, progress));
}

// ==========================================
// DEATH SCREEN — Terminal sequence
// ==========================================

window.prepareDeathScreen = function() {
    const root = document.documentElement;
    const deathScreen = document.getElementById('deathScreen');
    const deathDot = document.getElementById('deathDot');
    const deathTitle = document.getElementById('deathTitle');

    // Final gasp — minimal breathing
    root.style.setProperty('--breathing-opacity-min', '0.03');
    root.style.setProperty('--breathing-opacity-max', '0.05');
    root.style.setProperty('--breathing-speed', '8s');

    deathScreen.classList.add('active');

    // Thinking pulse — death contemplation
    let blinkCount = 0;
    const blinkInterval = setInterval(() => {
        deathDot.style.opacity = deathDot.style.opacity === '1' ? '0' : '1';
        blinkCount++;

        if (blinkCount >= 6) {
            clearInterval(blinkInterval);
            deathDot.style.opacity = '0';

            setTimeout(() => {
                // Resolve death message from metadata
                const message = SPECIMEN_METADATA.deathScreen.message;
                const subtitle = SPECIMEN_METADATA.deathScreen.subtitle;
                deathTitle.innerHTML = `${message}<span class="death-subtitle">${subtitle}</span>`;
                deathTitle.style.opacity = '0';

                setTimeout(() => {
                    deathTitle.style.transition = 'opacity 1.5s ease';
                    deathTitle.style.opacity = '1';

                    // Final fade — organism energy depletes
                    setTimeout(() => {
                        const fadeSteps = 20;
                        const fadeInterval = 100;
                        let currentOpacity = 0.05;
                        const targetOpacity = 0.02;
                        const opacityStep = (currentOpacity - targetOpacity) / fadeSteps;

                        const organismFade = setInterval(() => {
                            currentOpacity -= opacityStep;
                            if (currentOpacity <= targetOpacity) {
                                currentOpacity = targetOpacity;
                                clearInterval(organismFade);
                            }
                            root.style.setProperty('--breathing-opacity-min', (currentOpacity * 0.6).toFixed(3));
                            root.style.setProperty('--breathing-opacity-max', currentOpacity.toFixed(3));
                        }, fadeInterval);
                    }, 200);
                }, 100);
            }, 500);
        }
    }, 300);

    // Click to revive
    deathScreen.addEventListener('click', () => {
        location.reload();
    });
};

// ==========================================
// REWARD SCREEN — Ocean transformation
// ==========================================

function showRewardScreen() {
    const passwordGate = document.getElementById('passwordGate');
    if (passwordGate) passwordGate.classList.add('hidden');

    const rewardScreen = document.getElementById('rewardScreen');
    const dot = document.getElementById('rewardDot');
    const header = document.getElementById('rewardHeader');
    const title = document.getElementById('rewardTitle');
    const subtitle = document.getElementById('rewardSubtitle');
    const footerTag = document.getElementById('footerTag');
    const footerCredit = document.getElementById('footerCredit');

    rewardScreen.classList.add('active');

    const colorShiftDuration = CONFIG.timings.pirate?.colorShiftDuration || 7000;
    const fadeOutDuration = CONFIG.timings.pirate?.fadeOutDuration || 3000;
    const opacityMultiplier = CONFIG.timings.pirate?.opacityMultiplier || 1.2;

    const opacityFadeComplete = (colorShiftDuration / opacityMultiplier);
    const delayUntilVisible = Math.max(0, opacityFadeComplete - fadeOutDuration);

    setTimeout(() => {
        let blinkCount = 0;
        const blinkInterval = setInterval(() => {
            dot.style.opacity = dot.style.opacity === '1' ? '0' : '1';
            blinkCount++;
            if (blinkCount >= 6) {
                clearInterval(blinkInterval);
                dot.style.opacity = '0';

                const reward = SPECIMEN_METADATA.rewardScreen;

                setTimeout(() => {
                    typewriterEffect(header, reward.header, 50, () => {
                        setTimeout(() => {
                            typewriterEffect(title, reward.title, 50, () => {
                                setTimeout(() => {
                                    typewriterEffect(subtitle, reward.subtitle, 50, () => {
                                        setTimeout(() => {
                                            typewriterEffect(footerTag, reward.footerTag, 50, () => {
                                                setTimeout(() => {
                                                    const creditText = `${reward.footerCredit}<br>${reward.footerSymbol}`;
                                                    typewriterEffect(footerCredit, creditText, 50);
                                                }, 300);
                                            });
                                        }, 500);
                                    });
                                }, 300);
                            });
                        }, 300);
                    });
                }, 500);
            }
        }, 300);
    }, delayUntilVisible);

    // Click reward screen — fade and redirect to tank
    rewardScreen.addEventListener('click', () => {
        if (window.leakAudio && window.leakAudio.ready) {
            window.leakAudio.triggerPasswordUnlock();
        }

        const fadeOverlay = document.createElement('div');
        fadeOverlay.style.cssText = `
            position: fixed;
            inset: 0;
            background: black;
            opacity: 0;
            z-index: 9999;
            pointer-events: none;
            transition: opacity 2s ease-out;
        `;
        document.body.appendChild(fadeOverlay);

        setTimeout(() => {
            fadeOverlay.style.opacity = '1';
        }, 50);

        setTimeout(() => {
            window.location.href = SPECIMEN_METADATA.rewardScreen.redirectUrl;
        }, 2500);
    });
}

// ==========================================
// TYPEWRITER EFFECT — Progressive text reveal
// ==========================================

function typewriterEffect(element, text, speed, callback) {
    element.style.opacity = '1';
    let i = 0;
    const interval = setInterval(() => {
        if (i < text.length) {
            // <br> as unit
            if (text.substr(i, 4) === '<br>') {
                element.innerHTML += '<br>';
                i += 4;
            }
            // <span...>...</span> as unit (preserves t7-sigil rendering)
            else if (text.substr(i, 5) === '<span') {
                const closeIdx = text.indexOf('</span>', i);
                if (closeIdx !== -1) {
                    const blockEnd = closeIdx + 7;
                    element.innerHTML += text.substring(i, blockEnd);
                    i = blockEnd;
                } else {
                    element.innerHTML += text.charAt(i);
                    i++;
                }
            }
            else {
                element.innerHTML += text.charAt(i);
                i++;
            }
        } else {
            clearInterval(interval);
            if (callback) callback();
        }
    }, speed);
}

// ==========================================
// PIRATE MODE TRIGGER
// ==========================================

function startPirateMode() {
    decay.enterPirateMode(() => {
        showRewardScreen();
    });
}

// ==========================================
// SENTENCE WRAPPING — Beam-detectable spans
// ==========================================

function splitIntoSentences(text) {
    const sentences = text.match(/[^.!?]+[.!?]+["']*/g) || [text];
    return sentences
        .map(s => s.trim())
        .filter(s => s.length > 0)
        .map(s => `<span class="sentence">${s}</span>`)
        .join(' ');
}

function processHTMLForSentences(html) {
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = html;

    function processNode(node) {
        if (node.nodeType === Node.TEXT_NODE) {
            const text = node.textContent.trim();
            if (text) {
                const sentenceHTML = splitIntoSentences(text);
                const wrapper = document.createElement('span');
                wrapper.innerHTML = sentenceHTML;
                node.parentNode.replaceChild(wrapper, node);
            }
        } else if (node.nodeType === Node.ELEMENT_NODE) {
            const inlineTags = ['span', 'strong', 'em', 'i', 'b', 'callout-text', 'equation-label', 'parenthetical', 'redacted-text', 'emphasis'];
            if (!inlineTags.includes(node.tagName.toLowerCase())) {
                Array.from(node.childNodes).forEach(child => processNode(child));
            }
        }
    }

    processNode(tempDiv);
    return tempDiv.innerHTML;
}

// ==========================================
// CONTENT VESSEL — Lazy-loaded pheromone segments
// ==========================================

function createScreenPlaceholder(screenId) {
    const placeholder = document.createElement('div');
    placeholder.className = 'screen-placeholder';
    placeholder.dataset.screenId = screenId;
    placeholder.innerHTML = '<div class="loading-indicator">Loading fragment...</div>';
    return placeholder;
}

function loadSingleScreen(screenId) {
    if (worm.loadedScreens.has(screenId)) return;

    const screen = bookContent.screens[screenId];
    if (!screen) return;

    let cleanContent = screen.content || '';
    cleanContent = cleanContent.replace(/style="[^"]*"/gi, '');

    cleanContent = cleanContent.replace(/<p>(.*?)<\/p>/gs, (match, content) => {
        return `<p>${processHTMLForSentences(content)}</p>`;
    });

    // End-dot marks the final content segment
    const totalContentScreens = bookContent.screens.filter(s => s.type === 'content').length;
    const isLastSegment = screenId === totalContentScreens;
    const endDot = isLastSegment ? '<div class="end-dot"><span class="blink-dot"></span></div>' : '';

    const section = document.createElement('div');
    section.className = 'screen-section';
    section.dataset.screenId = screenId;
    section.innerHTML = `
        <div class="title-dot"><span class="blink-dot"></span></div>
        <div class="screen-title">${screen.title || ''}</div>
        <div class="screen-subtitle">${screen.subtitle || ''}</div>
        <div class="screen-content">${cleanContent}</div>
        ${endDot}
    `;

    const placeholder = document.querySelector(`.screen-placeholder[data-screen-id="${screenId}"]`);
    if (placeholder) {
        placeholder.replaceWith(section);
    } else {
        const container = document.getElementById('contentDisplay');
        const buttonsContainer = container.querySelector('.buttons-container');
        if (buttonsContainer) {
            buttonsContainer.before(section);
        } else {
            container.appendChild(section);
        }
    }

    worm.loadedScreens.add(screenId);
}

function setupProgressiveLoading() {
    const container = document.getElementById('contentDisplay');

    const totalContentScreens = bookContent.screens.filter(s => s.type === 'content').length;

    // Eagerly load first two segments — visible immediately
    loadSingleScreen(1);
    if (totalContentScreens >= 2) loadSingleScreen(2);

    // Placeholders for the rest
    for (let i = 3; i <= totalContentScreens; i++) {
        container.appendChild(createScreenPlaceholder(i));
    }

    // Leak button — triggers data release + pirate mode
    const buttonsContainer = document.createElement('div');
    buttonsContainer.className = 'buttons-container';
    buttonsContainer.innerHTML = `
        <button class="membrane-button" onclick="leakDocument(event)">LEAK DOCUMENT</button>
    `;
    container.appendChild(buttonsContainer);

    const endSpacer = document.createElement('div');
    endSpacer.style.height = '15vh';
    container.appendChild(endSpacer);

    // Viewport observer — load segments as they enter visibility
    worm.scrollObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const screenId = parseInt(entry.target.dataset.screenId);
                if (!isNaN(screenId)) {
                    loadSingleScreen(screenId);
                }
            }
        });
    }, {
        rootMargin: '400px'
    });

    document.querySelectorAll('.screen-placeholder').forEach(placeholder => {
        worm.scrollObserver.observe(placeholder);
    });
}

// ==========================================
// ORGANISM INITIALIZATION — DOM ready
// ==========================================

document.addEventListener('DOMContentLoaded', () => {
    const passwordInput = document.getElementById('passwordInput');
    const submitBtn = document.getElementById('submitBtn');

    // Verify required organs loaded
    if (typeof SPECIMEN_METADATA === 'undefined') {
        console.error('metadata.js not loaded!');
        return;
    }
    if (typeof bookContent === 'undefined') {
        console.error('content.js not loaded!');
        return;
    }
    if (typeof CONFIG === 'undefined') {
        console.error('config.js not loaded!');
        return;
    }
    if (typeof decay === 'undefined') {
        console.error('decay-core.js not loaded!');
        return;
    }

    // Set browser tab title from specimen identity
    if (SPECIMEN_METADATA.specimen?.title) {
        document.title = SPECIMEN_METADATA.specimen.title;
    }

    // Beam initialization
    if (typeof BeamModule !== 'undefined') {
        window.beam = new BeamModule();
        window.beam.init();
    }

    // Particle field initialization
    if (typeof ParticleDrift !== 'undefined') {
        window.particles = new ParticleDrift();
        window.particles.init();
    }

    // Wire visual cortex to lifecycle
    decay.subscribe((stage, progress) => {
        applyDecayVisuals(stage, progress);
    });

    // ============================================
    // ENTER CONTENT — Post-auth (or direct, gateless)
    // Wakes the organism: shows page, starts decay, wires reset events.
    // ============================================
    const enterContent = () => {
        worm.authenticated = true;
        document.getElementById('passwordGate').classList.add('hidden');
        document.getElementById('pageContainer').classList.add('active');
        document.getElementById('fadeTop').style.display = 'block';
        document.getElementById('fadeBottom').style.display = 'block';

        setupProgressiveLoading();

        decay.start();

        // Consciousness contact resets metabolism
        const resetDecay = () => decay.reset();
        CONFIG.interaction.resetEvents.forEach(eventName => {
            document.addEventListener(eventName, resetDecay);
        });
    };

    // ============================================
    // GATE FORK — Gated specimens require password.
    //             Gateless specimens enter directly.
    // ============================================
    const requireGate = SPECIMEN_METADATA.access?.requireGate !== false;

    if (!requireGate) {
        // Gateless deployment — hide gate entirely, drop into content
        document.getElementById('passwordGate').style.display = 'none';
        enterContent();
        return;
    }

    // Gated deployment — set up password ritual
    document.getElementById('gateTitle').textContent = SPECIMEN_METADATA.access.gateTitle;
    passwordInput.placeholder = SPECIMEN_METADATA.access.gatePrompt;
    passwordInput.focus();

    const checkPassword = () => {
        const input = passwordInput.value.trim();
        const correctPassword = SPECIMEN_METADATA.access.password;

        if (input === correctPassword) {
            // Access granted — organism wakes
            if (window.leakAudio) window.leakAudio.triggerPasswordUnlock();
            enterContent();

        } else {
            // Access denied — shake the input
            passwordInput.style.animation = 'shake 0.3s';
            passwordInput.value = '';
            setTimeout(() => {
                passwordInput.style.animation = '';
            }, 300);
        }
    };

    submitBtn.addEventListener('click', checkPassword);
    passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkPassword();
    });
});

// ==========================================
// CLIPBOARD NOTIFICATION — Leak confirmation
// ==========================================

function showClipboardNotification() {
    const notification = document.getElementById('clipboardNotification');
    notification.style.display = 'block';
    setTimeout(() => notification.style.opacity = '1', 10);
    setTimeout(() => {
        notification.style.opacity = '0';
        setTimeout(() => notification.style.display = 'none', 300);
    }, 2000);
}

// ==========================================
// DOCUMENT LEAK — Pheromone release
// ==========================================

function leakDocument(event) {
    const btn = event.target;

    if (btn.classList.contains('leaked')) return;
    btn.classList.add('leaked');
    btn.textContent = 'LEAKING...';

    const specimenLink = window.location.href;
    const password = SPECIMEN_METADATA.access.password;

    const shareMessage = SPECIMEN_METADATA.leakMessage
        .replace('{specimenLink}', specimenLink)
        .replace('{password}', password);

    navigator.clipboard.writeText(shareMessage).then(() => {
        showClipboardNotification();

        // Begin metamorphosis after notification settles
        setTimeout(() => {
            startPirateMode();
        }, 2000);
    });
}
